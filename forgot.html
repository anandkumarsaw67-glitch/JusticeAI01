<!DOCTYPE html>
<html>
<head>
  <title>Reset Password - Justice AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
  <div class="auth-box fade-in">
    <h2>⚖️ Reset Password</h2>
    <input id="resetUsername" type="text" placeholder="Enter your Username">
    <br>
    <input id="newPassword" type="password" placeholder="Enter New Password">
    <br><br>
    <button onclick="resetPassword()" style="width: 250px;">Update Password</button>
    <p class="auth-link"><a href="login.html">Back to Login</a></p>
  </div>
  <script src="app.js"></script>
</body>
</html>
