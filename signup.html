<!DOCTYPE html>
<html>
<head>
  <title>Signup - Justice AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
  <div class="auth-box fade-in">
    <h2>⚖️ Create Account</h2>
    <input id="username" type="text" placeholder="Choose a Username">
    <br>
    <input id="password" type="password" placeholder="Choose a Password">
    <br><br>
    <button onclick="signup()" style="width: 250px;">Sign Up</button>
    <p class="auth-link">Already have an account? <a href="login.html">Login</a></p>
  </div>
  <script src="app.js"></script>
</body>
</html>
