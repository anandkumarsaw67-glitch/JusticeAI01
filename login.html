<!DOCTYPE html>
<html>
<head>
  <title>Login - Justice AI</title>
 
  <link rel="stylesheet" href="style.css">

    <h2>⚖️ Justice AI Login</h2>

    <p class="auth-link" style="margin-top: 10px;"><a href="forgot.html" style="font-size: 13px; font-weight: normal;">Forgot Password?</a></p>

  </div>
  <script src="app.js"></script>

</html>
